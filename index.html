<!DOCTYPE html>
<html>
<head>
    <title>Property Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🏠 Property Price Prediction</h1>

    <form action="/predict" method="post">

        <fieldset>
            <legend>📍 Location Details</legend>
            <label>Area</label>
            <select name="area">
                {% for a in areas %}
                <option value="{{ a }}">{{ a }}</option>
                {% endfor %}
            </select>

            <label>Locality Rating</label>
            <input type="number" step="0.1" name="locality_rating" required>

            <label>Distance from City (km)</label>
            <input type="number" step="0.1" name="distance" required>
        </fieldset>

        <fieldset>
            <legend>🏡 Property Details</legend>
            <label>Area (Sqft)</label>
            <input type="number" name="area_sqft" required>

            <label>BHK</label>
            <input type="number" name="bhk" required>

            <label>Bathrooms</label>
            <input type="number" name="bathrooms" required>

            <label>Balcony</label>
            <input type="number" name="balcony" required>

            <label>Floor</label>
            <input type="number" name="floor" required>

            <label>Total Floors</label>
            <input type="number" name="total_floors" required>

            <label>Property Age (Years)</label>
            <input type="number" name="age" required>
        </fieldset>

        <fieldset>
            <legend>🛋 Property Type</legend>
            <label>Furnishing</label>
            <select name="furnishing">
                <option>Unfurnished</option>
                <option>Semi-Furnished</option>
                <option>Fully-Furnished</option>
            </select>

            <label>Property Type</label>
            <select name="property_type">
                <option>Apartment</option>
                <option>Villa</option>
                <option>Row House</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>🚗 Amenities</legend>
            <select name="parking"><option>No</option><option>Yes</option></select>
            <select name="lift"><option>No</option><option>Yes</option></select>
            <select name="security"><option>No</option><option>Yes</option></select>
            <select name="power_backup"><option>No</option><option>Yes</option></select>
        </fieldset>

        <fieldset>
            <legend>🏥 Nearby Facilities</legend>
            <label>School (km)</label>
            <input type="number" step="0.1" name="school" required>

            <label>Hospital (km)</label>
            <input type="number" step="0.1" name="hospital" required>

            <label>Market (km)</label>
            <input type="number" step="0.1" name="market" required>
        </fieldset>

        <button type="submit">Predict Price</button>
    </form>

    {% if total_price %}
    <div class="result">
        <h2>₹ {{ price_sqft }} / Sqft</h2>
        <h2>Total Price: ₹ {{ total_price }}</h2>
    </div>
    {% endif %}
</div>

</body>
</html>
